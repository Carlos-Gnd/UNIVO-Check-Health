# Configuración de despliegue en Netlify para UNIVO Check-Health
# Frontend estático (Vite/React). El backend es Supabase Cloud — los datos
# van directo navegador↔Supabase, Netlify solo sirve el bundle.

[build]
  command = "pnpm build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Las variables VITE_* se configuran en Netlify → Site settings → Environment.
  # NO definir VITE_SUPABASE_SERVICE_ROLE: las operaciones admin viven en la
  # Edge Function admin-users (B-01), nunca en el cliente.

# SPA fallback: React Router maneja el enrutamiento del lado del cliente
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cabeceras de seguridad básicas
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# El service worker de FCM debe servirse desde la raíz sin caché agresivo
[[headers]]
  for = "/firebase-messaging-sw.js"
  [headers.values]
    Cache-Control = "no-cache"
