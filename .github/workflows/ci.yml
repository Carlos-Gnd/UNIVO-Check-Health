name: CI

on:
  push:
    branches: [main, 'feature/**', 'fix/**']
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm exec tsc --noEmit

      - name: Test
        run: pnpm exec vitest run --coverage
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder

      - name: Build
        run: pnpm build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder

  # Aplica TODAS las migraciones sobre una base de datos LIMPIA. Esto atrapa
  # automáticamente los bugs de integridad que nos costaron horas: migraciones con
  # DDL `app.*` sin guardia, columnas/funciones que quedan sin crear, overloads
  # ambiguos, etc. Si una migración falla en limpio, el CI falla y NO se mergea.
  migrations:
    name: Migrations · clean DB apply
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase stack (aplica migraciones + seed al arrancar)
        run: supabase start

      - name: Re-aplicar migraciones en BD limpia (sin seed)
        run: supabase db reset --no-seed

      - name: Stop
        if: always()
        run: supabase stop
